name: Bug Report
description: Report something that isn't working correctly.
title: "[Bug]: "
labels:
  - bug

body:
  - type: textarea
    id: description
    attributes:
      label: What happened?
      placeholder: Describe the bug.
    validations:
      required: true

  - type: textarea
    id: reproduce
    attributes:
      label: Steps to Reproduce
      placeholder: |
        1.
        2.
        3.
    validations:
      required: true

  - type: textarea
    id: expected
    attributes:
      label: Expected Behavior

  - type: textarea
    id: screenshots
    attributes:
      label: Screenshots (Optional)

  - type: textarea
    id: environment
    attributes:
      label: Environment
      placeholder: Browser, OS, Device...